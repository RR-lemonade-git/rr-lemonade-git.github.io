<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lemonade Stand</title>
    <link rel="icon" href="favicon.svg" type="image/svg+xml">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            max-width: 600px;
            width: 100%;
            overflow: hidden;
        }

        header {
            background: linear-gradient(135deg, #ffd89b 0%, #19547b 100%);
            color: white;
            padding: 40px 20px;
            text-align: center;
        }

        header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.2);
        }

        header p {
            font-size: 1.1em;
            opacity: 0.95;
        }

        .content {
            padding: 40px;
        }

        .section {
            margin-bottom: 35px;
        }

        .section h2 {
            color: #667eea;
            margin-bottom: 20px;
            font-size: 1.8em;
            border-bottom: 3px solid #ffd89b;
            padding-bottom: 10px;
        }

        .schedule-item {
            background: #f8f9ff;
            padding: 15px;
            margin-bottom: 12px;
            border-left: 4px solid #667eea;
            border-radius: 5px;
            transition: transform 0.2s;
        }

        .schedule-item:hover {
            transform: translateX(5px);
            background: #f0f2ff;
        }

        .day {
            font-weight: bold;
            color: #667eea;
            font-size: 1.1em;
            margin-bottom: 5px;
        }

        .time {
            color: #666;
            font-size: 0.95em;
        }

        .item-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
        }

        .item-card {
            background: linear-gradient(135deg, #ffd89b 0%, #ffed4e 100%);
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
            transition: transform 0.2s;
        }

        .item-card:hover {
            transform: scale(1.05);
        }

        .item-name {
            font-weight: bold;
            font-size: 1.2em;
            color: #333;
            margin-bottom: 8px;
        }

        .item-price {
            color: #e74c3c;
            font-size: 1.3em;
            font-weight: bold;
        }

        footer {
            background: #f8f9ff;
            padding: 20px;
            text-align: center;
            color: #666;
            font-size: 0.9em;
            border-top: 1px solid #e0e0e0;
        }

        @media (max-width: 600px) {
            header h1 {
                font-size: 2em;
            }

            .content {
                padding: 20px;
            }

            .section h2 {
                font-size: 1.5em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🍋 Lemonade Stand</h1>
            <p>Fresh & Refreshing!</p>
        </header>

        <div class="content">
            <div class="section">
                <h2>📅 Upcoming Dates</h2>
                <div class="schedule-item">
                    <div class="day">June 18th</div>
                    <div class="time">4:00 PM - 7:30 PM</div>
                </div>
            </div>

            <div class="section">
                <h2>🥤 What We Have</h2>
                <div class="item-grid">
                    <a href="classic-ingredients.html" class="item-card" style="text-decoration:none;color:inherit;">
                        <div class="item-name">Classic Lemonade</div>
                        <div class="item-price">$1</div>
                    </a>
                    <a href="popsicle-ingredients.html" class="item-card" style="text-decoration:none;color:inherit;">
                        <div class="item-name">Popsicles</div>
                        <div class="item-price">$0.50</div>
                    </a>
                </div>
            </div>
        </div>

        <footer>
            <p><a href="https://maps.app.goo.gl/YTVNvvfSgS34xhv56" target="_blank" rel="noopener">Visit us at renaissance ridge</a></p>
        </footer>
    </div>
</body>
</html>
