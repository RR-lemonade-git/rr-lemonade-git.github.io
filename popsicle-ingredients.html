<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Popsicles - Ingredients</title>
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <style>
    :root{--yellow:#FFD93D;--lemon:#FFF37A;--accent:#D64545;--card:#FFFFFF}
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:Inter, system-ui, -apple-system, 'Segoe UI', Roboto, Arial;min-height:100vh;background:linear-gradient(180deg,#e8f9ff 0%, #fff9e6 60%);display:flex;align-items:center;justify-content:center;padding:24px}
    .site{width:100%;max-width:720px;background:linear-gradient(180deg,#ffffffcc, #fff);border-radius:18px;box-shadow:0 12px 40px rgba(16,24,40,0.12);overflow:hidden;border:6px solid #fff}
    header{background:linear-gradient(90deg,var(--yellow),var(--lemon));padding:24px 20px;display:flex;align-items:center;gap:14px}
    .logo{width:64px;height:64px;border-radius:50%;display:flex;align-items:center;justify-content:center;background:radial-gradient(circle at 30% 30%,#fff 0%,#fff0 35%),linear-gradient(180deg,#fff 0,#ffe08a 70%);font-size:30px}
    h1{font-size:20px;color:#2b2b2b}
    .content{padding:22px}
    .card{background:var(--card);padding:18px;border-radius:12px;box-shadow:0 6px 18px rgba(16,24,40,0.06)}
    h2{color:#1f3a93;margin-bottom:10px}
    ul{margin-left:18px;color:#333}
    a.back{display:inline-block;margin-top:14px;color:var(--accent);text-decoration:none;font-weight:700}
    footer{padding:12px 20px;background:linear-gradient(180deg,#fff,#fafafa);text-align:center;color:#5b6b95;font-size:13px}
  </style>
</head>
<body>
  <div class="site">
    <header>
      <div class="logo">🍧</div>
      <div>
        <h1>Popsicles</h1>
      </div>
    </header>

    <div class="content">
      <div class="card">
        <h2>Ingredients (placeholders)</h2>
        <ul>
          <li>Juice (placeholder)</li>
          <li>Sugar (placeholder)</li>
          <li>Water</li>
          <li>Freeze mold</li>
        </ul>
        <a class="back" href="https://rr-lemonade-git.github.io/">← Back to menu</a>
      </div>
    </div>

    <footer>
      <p><a href="https://maps.app.goo.gl/tVmLky6RYUMfo2EB6" target="_blank" rel="noopener">Visit us at renaissance ridge</a></p>
    </footer>
  </div>
</body>
</html>
